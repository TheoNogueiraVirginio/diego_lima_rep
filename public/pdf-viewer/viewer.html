<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Material Didático</title>
  <link rel="shortcut icon" href="../images/logo_diego_redonda.png">
  <style>
    /* Reset básico para o container do iframe */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; 
      background-color: #525659;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="pdfFrame" src=""></iframe>

  <script>
    (function() {
      // Função para ler param da URL (?doc=ID_DO_ARQUIVO)
      function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      const docId = getQueryParam('doc');

      if (docId) {
        // Caminho relativo para o visualizador instalado: ../lib/pdfjs/web/viewer.html
        // Esse visualizador aceita ?file=URL_DO_ARQUIVO como parâmetro
        const viewerPath = '../lib/pdfjs/web/viewer.html';
        
        // URL da nossa API que serve o PDF com marca d'água
        const apiPdfUrl = `/api/pdf/${encodeURIComponent(docId)}`;
        
        // Monta a URL final para o iframe
        const finalSrc = `${viewerPath}?file=${encodeURIComponent(apiPdfUrl)}`;
        
        document.getElementById('pdfFrame').src = finalSrc;
      } else {
        document.body.innerHTML = '<div style="color:white;text-align:center;padding:50px;font-family:sans-serif;">Erro: Documento não especificado.</div>';
      }
    })();
  </script>
</body>
</html>
