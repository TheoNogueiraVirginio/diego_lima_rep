<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistir Aula</title>
    <link rel="shortcut icon" href="/images/logo_diego_redonda.png">

    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="styles/assistir.css">
    <link rel="stylesheet" href="styles/strong_titles.css">
</head>


<body>

    <div class="player-container">
        <a id="back-btn" href="#" class="back-button">&larr; Voltar</a>
        <h1 id="class-title">Carregando... Ex: Módulo 1</h1>

        <div class="player-body">
            <div class="video-container">
                <iframe id="video-player" src="" allowfullscreen></iframe>
            </div>

            <div class="sidebar">
                <h2 class="sidebar-header">Próximas Aulas</h2>
                <ul id="upcoming-classes">
                    
                </ul>
            </div>
        </div>

        <div class="comments_practice">
            <div class="comments-section">
                <textarea id="comment-input" placeholder="Escreva seu comentário particular aqui. Sugestões, dúvidas, reflexões..."></textarea>
                <button id="submit-comment">Enviar Comentário</button>
            </div>

            <div class="video-ended">
                <button class="finished-video-button">Marcar como concluído</button>
                <button class="practice-button">Ir para a prática</button> <!--INSERIR COMANDO DE REDIRECIONAMENTO-->
            </div>
        </div>
    </div>

    <script src="componentes/navbar.js"></script>
    <script src="scripts/dados_aulas.js"></script>
    <script src="/scripts/authBanner.js"></script>
    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="scripts/assistir.js"></script>
    <script src="/scripts/progress.js"></script>

</body>
</html>
